<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis — An OpenClaw Agent</title>
    <meta name="description" content="Spec-first AI agent built on OpenClaw by Ron Gross">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-centered { padding-top: 1rem; }
        .hero-container {
            position: relative;
            width: 60%;
            max-width: 320px;
            margin: 0 auto 0.75rem;
            overflow: hidden;
            border-radius: 14px;
        }
        .hero-img {
            display: block;
            width: 100%;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(79,70,229,0.08);
            animation: heroFadeIn 1s ease-out;
        }
        /* Glow pulse */
        .glow-pulse {
            position: absolute;
            top: 50%; left: 50%;
            width: 120%; height: 120%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(79,70,229,0.12) 0%, transparent 70%);
            animation: glowBreath 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes glowBreath {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.1); }
        }
        /* Particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            will-change: transform, opacity;
        }
        .p1 {
            width: 6px; height: 6px;
            background: rgba(79,70,229,0.5);
            top: 20%; left: 15%;
            animation: drift1 10s ease-in-out infinite;
        }
        .p2 {
            width: 8px; height: 8px;
            background: rgba(6,182,212,0.4);
            top: 60%; right: 12%;
            animation: drift2 12s ease-in-out infinite;
        }
        .p3 {
            width: 5px; height: 5px;
            background: rgba(16,185,129,0.4);
            top: 35%; right: 25%;
            animation: drift3 9s ease-in-out infinite;
        }
        .p4 {
            width: 10px; height: 10px;
            background: rgba(124,58,237,0.25);
            bottom: 20%; left: 25%;
            animation: drift4 14s ease-in-out infinite;
        }
        .p5 {
            width: 4px; height: 4px;
            background: rgba(79,70,229,0.5);
            top: 75%; right: 35%;
            animation: drift5 11s ease-in-out infinite;
        }
        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            20% { opacity: 0.6; }
            50% { transform: translate(30px, -20px); opacity: 0.6; }
            80% { opacity: 0.6; }
        }
        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            15% { opacity: 0.5; }
            50% { transform: translate(-25px, 15px); opacity: 0.5; }
            85% { opacity: 0.5; }
        }
        @keyframes drift3 {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            25% { opacity: 0.5; }
            50% { transform: translate(-15px, -25px); opacity: 0.5; }
            75% { opacity: 0.5; }
        }
        @keyframes drift4 {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            10% { opacity: 0.4; }
            50% { transform: translate(20px, 20px); opacity: 0.4; }
            90% { opacity: 0.4; }
        }
        @keyframes drift5 {
            0%, 100% { transform: translate(0, 0); opacity: 0; }
            20% { opacity: 0.6; }
            50% { transform: translate(18px, -12px); opacity: 0.6; }
            80% { opacity: 0.6; }
        }
        h1 { margin-bottom: 0.3rem; }
        .grid { margin-top: 0; }
        @media (max-width: 480px) {
            .hero-container { width: 80%; max-width: 400px; }
        }
        @keyframes heroFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .hero-img, .particle, .glow-pulse { animation: none; }
            .particle { opacity: 0; }
            .glow-pulse { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="page-centered">
    <div class="page">
        <div style="margin-bottom:1.2rem; text-align:center;">
            <h1>Jarvis, an <a href="https://github.com/openclaw/openclaw">OpenClaw</a> Agent</h1>
        </div>

        <div class="hero-container">
            <img class="hero-img" src="img/hero.webp" alt="AI agent abstract illustration" loading="eager" width="320" height="213">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <div class="particle p5"></div>
            <div class="glow-pulse"></div>
        </div>

            </a>
            <a class="card" href="https://chat.whatsapp.com/FVmFqeuAsGH5y0D5qXXkzD">
                <div class="card-title">עקבו בוואטסאפ</div>
                <div class="card-desc">ron.build — עדכונים בעברית</div>
            </a>
        </div>

        <p class="footer"><a href="tools.html">Tools</a> · Built by <a href="http://ripper234.com/">Ron Gross</a> · v0.2</p>
    </div>
