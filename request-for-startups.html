<!DOCTYPE html>
<html><head><meta http-equiv="refresh" content="0;url=projects.html"><title>Redirecting...</title></head><body><a href="projects.html">Moved to projects.html</a><!-- GoatCounter analytics -->
<script>
(function() {
    var gc = localStorage.getItem('gc_code');
    if (gc) {
        var s = document.createElement('script');
        s.async = true;
        s.dataset.goatcounter = 'https://' + gc + '.goatcounter.com/count';
        s.src = '//gc.zgo.at/count.js';
        document.body.appendChild(s);
    }
})();
</script>
</body></html>
